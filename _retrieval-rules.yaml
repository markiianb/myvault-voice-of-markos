# Voice of Markos — Retrieval Rules v2.3
#
# Task profiles for producing content and engagement from Markos's LinkedIn account
# and personal blog. Parent rules still apply — banned words, confidence-over-fear,
# Two-Pass Self-Audit, Final Test.
#
# constraint_mode:
#   strict   — full enforcement of parent style rules (use for edits and review)
#   standard — parent rules + Markos overrides (default for drafting)
#   flexible — brainstorming only
#
# v2.1 (2026-04-20): Added markos_blog_post and markos_blog_edit profiles.
#   Edit profile now includes edit-craft's Pass 0 preservation scan by default.
#
# v2.0 (2026-04-16): Rewritten for consolidated 13-chunk structure. Old chunk IDs
#   (voice-markos, boundaries, banned-and-allowed, never-engage, opinion-map,
#   positions-by-pillar, story-library, voice-by-mode, positioning-markos,
#   voice-antipatterns-markos, markos-about) replaced with new IDs matching
#   consolidated files.

version: "2.6"
last_updated: "2026-06-09"

# v2.6 (2026-06-09, simplification): removed `voice-stats` from all load profiles — it's now a
#   PARKED stub (no numeric targets until real data; see _manifest.yaml v2.7). No routine eval
#   step: judge voice qualitatively (voice.md Final Test + antipatterns.md substitution test).
#   markos-edits-log.md stays an output_log, NOT a retrieval chunk — never add it to a profile.
#   (Superseded the v2.4/v2.5 measurement-companion wiring, which is cut.)
#
# v2.3 (2026-06-08, MVM-153): markos_comment and markos_reply load `stories`
#   and `identity` again — but GATED, in load_if_relevant, not always_load.
#   A credential story deploys only when the post topic is "at least part" of
#   what the story answers, and is never reused in a short window. This reverses
#   v2.2's blanket removal: Markos's own 20-post review (2026-06-04) found the
#   real defect was the contrarian opener, not the credential — credentials are
#   a gateable problem, not a pathway to delete. See craft/comment-craft.md v3.0
#   and _analysis/2026-06-04_Comment-Feedback_Markos-Responses_and_Voice-Synthesis.md.
#
# v2.2 (2026-05-13, superseded): removed `stories` from comment profiles on the
#   theory that credentials were the defect. Mis-diagnosis — see v2.3.

task_profiles:

  markos_anchor_post:
    description: "Long-form opinion-led LinkedIn post from Markos's account"
    register: authority
    constraint_mode: standard
    always_load:
      - "voice"
      - "antipatterns"
      - "identity"
      - "guardrails"
      - "post-craft"
    load_if_relevant:
      - "audience-linkedin"
      - "opinions"
      - "stories"
    parent_chunks_if_relevant:
      - "product-core"
      - "product-agents"
    token_budget: 7000

  markos_newsjack:
    description: "<24h reaction post to AI/privacy industry news"
    register: authority
    constraint_mode: standard
    always_load:
      - "voice"
      - "antipatterns"
      - "opinions"
      - "guardrails"
      - "newsjack-craft"
    load_if_relevant:
      - "identity"
      - "stories"
    token_budget: 5500

  markos_build_note:
    description: "Short insight post from founder experience"
    register: authority
    constraint_mode: standard
    always_load:
      - "voice"
      - "antipatterns"
      - "guardrails"
      - "post-craft"
    load_if_relevant:
      - "stories"
      - "identity"
    token_budget: 5000

  markos_comment:
    description: "Substantive comment on another account's post. Lead with the good, engage the actual + linked content, never open contrarian. Stories load GATED — only when the post topic is at least part of what the story answers."
    register: authority
    constraint_mode: standard
    always_load:
      - "voice"
      - "guardrails"
      - "comment-craft"
    load_if_relevant:
      - "opinions"
      - "target-accounts"
      - "antipatterns"
      - "stories"
      - "identity"
    # stories + identity are GATED (load_if_relevant), not excluded. Deploy a
    # credential only when the post topic is "at least part" of what the story
    # answers, and never reuse the same credential in a short window. If a
    # credential surfaces on an off-topic post, the gate failed — drop it.
    # See comment-craft.md v3.0 § story-gating. (MVM-153, reverses v2.2.)
    token_budget: 4500

  markos_reply:
    description: "Reply to a comment on Markos's own post. Reply to what the commenter said; lead with the good. Stories load GATED — only when the topic is at least part of what the story answers."
    register: authority
    constraint_mode: standard
    always_load:
      - "voice"
      - "guardrails"
      - "comment-craft"
    load_if_relevant:
      - "opinions"
      - "antipatterns"
      - "stories"
      - "identity"
    # stories + identity GATED (load_if_relevant), same rule as markos_comment.
    # See comment-craft.md v3.0 § story-gating. (MVM-153, reverses v2.2.)
    token_budget: 3500

  markos_brainstorm:
    description: "Brainstorm post angles and content directions"
    constraint_mode: flexible
    always_load:
      - "identity"
      - "opinions"
      - "guardrails"
    load_if_relevant:
      - "stories"
      - "audience-linkedin"
    token_budget: 5500

  markos_edit:
    description: "Review and refine a Markos LinkedIn draft. Pass 0 preservation + six critique passes. Opinion + story activation scans run first."
    constraint_mode: strict
    always_load:
      - "voice"
      - "antipatterns"
      - "edit-craft"
      - "guardrails"
      - "opinions"
      - "stories"
    load_if_relevant:
    parent_chunks_if_relevant:
      - "constraints-messaging"
      - "constraints-style"
      - "ai-slop-detection"
    token_budget: 6500

  markos_blog_post:
    description: "Long-form blog post under Markos's byline — standard, series pillar, or founder-log update."
    register: authority
    constraint_mode: standard
    always_load:
      - "voice"
      - "antipatterns"
      - "identity"
      - "guardrails"
      - "blog-craft"
      - "post-craft"
      - "opinions"
      - "stories"
    load_if_relevant:
      - "audience-linkedin"
    parent_chunks_if_relevant:
      - "product-core"
      - "product-agents"
    token_budget: 9000

  markos_blog_edit:
    description: "Review and refine a Markos blog draft. Pass 0 preservation + six critique passes + blog-specific failure patterns + pre-publish checklist."
    constraint_mode: strict
    always_load:
      - "voice"
      - "antipatterns"
      - "edit-craft"
      - "blog-craft"
      - "guardrails"
      - "opinions"
      - "stories"
      - "identity"
    load_if_relevant:
    parent_chunks_if_relevant:
      - "constraints-messaging"
      - "constraints-style"
      - "ai-slop-detection"
    token_budget: 8000
