changelog:
  - "2.9.1 (2026-06-10, length-variance): Mark's same-day review of the comment system: 'some of them are too lengthy... vary the length based on the content; some can be short.' The batch over-applied v3.0's technical-length allowance (~8 sentences became de facto default because most targets are technical) — a length echo, same defect as the opener echo expressed in size. comment-craft.md → v3.2 (long is earned, not default: default to the shortest version that lands; ~8 only when every sentence carries a concrete hook; new batch rule: length distribution must show a real spread, most-drafts-5+-sentences = fail). voice.md → v3.5 (length row + comments-are-different updated). CLAUDE.md Batch QA: length distribution added to the mechanical scan. Grounded in Markos's own data: his 4 clean accepts were short terse replies; several of his own comments are 2-3 sentences."
  - "2.9 (2026-06-10, texture-reconciliation): Fixed the TEMPLATE ECHO defect from Sead's review of the 2026-06-08 comment batch (35 drafts, rule-compliant but 'standard AI speech': the chunk's single example sentence was stamped batch-wide — '25 years' 9x, 'the line that lands' ~10x, 'You nailed' 5x). comment-craft.md → v3.1 (texture pack mined verbatim from Markos's 13 real comments: real opener bank, credential-phrasing rotation with 'In 25 years building enterprise systems' banned verbatim, syntactic fingerprint, density norm, batch-level diversity rules; single example shape replaced with real-Markos examples per framework; examples-are-menus-never-templates). antipatterns.md → v1.3 (The Template Echo portrait + the red-line tell list, binary bans; Quick Scan item 6; batch-repetition self-audit question). post-craft.md → v1.1 (credential rotation; menus-not-templates; tell scan in the publish sequence — Sead flagged posts too). voice.md → v3.4 (written-texture note: stop sanding off his typed-in-the-moment register; imitation source is his real corpus, never chunk examples). voice-stats.md → v1.2 (tell-frequency batch report, reported indicator never a target). CLAUDE.md: mandatory Batch QA step for comment batches (cross-batch repetition scan + blind-lineup spot check) — per-draft rules don't survive parallel generation. Ground truth imported vault-side (_analysis/2026-06-04-comment-feedback-markos-responses-and-voice-synthesis.md). Next: re-draft the 35 under v3.1, Sead pre-review, then Markos's Stage 2 round. Launch stays gated. Plan: _analysis/2026-06-10-comment-system-v3.1-texture-plan.md."
  - "2.8 (2026-06-09, restore-with-constitution): Reverted the v2.7 simplification and restored the measurement spine to its v2.6 honest form (voice-stats directional-prior vector, the /myvault:voice-eval gate, playbooks/improvement-loop.md, the trend block, the log tags) — per Mark's call to keep the capability, not park it. The spine that came back is the HONEST one: the v2.5 fixes (no strawman ×-multipliers, em-dash demoted, originality the PRIMARY gate, substitution test canonical) are intact; we did NOT resurrect the naive v2.4 numbers. NEW: PRINCIPLES.md (v1.0) — the constitution layer the system never had. It states the Spiral learnings as governing principles (curated substance not averaged samples; originality is the moat; measure only against real ground truth; capture real edits; the loop never auto-mutates; keep instruments ready-but-honest). This is what makes the restore sound rather than a relapse: the spine is wired AND governed — its numbers are explicitly a directional prior until Markos's real edits (markos-edits-log, Loop 1) make them trustworthy. The standing test before adding machinery: does it have real ground truth? If not, park don't build. Launch stays gated. (v2.7, 2026-06-09, was the brief simplification that cut the spine; reversed here — the lesson it carried is now preserved as PRINCIPLES.md rather than as a deletion.)"
  - "2.6 (2026-06-09, evaluation + improvement loop): Specified and RAN the round-over-round improvement loop (the backlog item v2.4/v2.5 left as single-pass-only). NEW chunk playbooks/improvement-loop.md (v1.0): the discrimination test + the loop procedure + the hard honesty limits (no real Markos in the loop) + never-optimize-blend-in + never-auto-mutate. First real run (_research/2026-06-09-improvement-loop/run-1.md, workflow wf_b784c01c-bdd) on the frontier-model post: discrimination test ranked gold > system-draft > anti correctly; originality converged by R1 and held, but the blind-lineup caught the draft at high confidence ALL 3 rounds (R1-2 a leaked generator meta-reasoning preamble; R3 written-register smoothness) and voice-stats did not converge — an honest 'mechanism works, not validated' result. Surfaced 5 system-fix candidates to _analysis/voice-corrections-log.md, ALL UNRATIFIED (none applied; most are generator-wiring, not chunk edits). approval-workflow → v1.3 (trend row added). NOT done (held to discipline): no canon auto-mutated, nothing ratified on one synthetic run, no claim the loop validates against real Markos. The real next step is Loop 1 data, not another loop run. Launch stays gated."
  - "2.5 (2026-06-09, ground-truth loops): First-principles improvement per the 2026-06-08 adversarial audit — the system had ZERO ground truth (built from one voice session + self-authored renderings). Closes the missing feedback loops + fixes calibration honesty; process-first, deferring precision instruments that need data we don't have. (A) Honesty: voice-stats → v1.1 strikes the ×generic-AI multiplier column (self-authored strawman) and relabels rates as a DIRECTIONAL PRIOR; the em-dash target is demoted to a qualitative on-principle rule (the 25/1k number was circular — from our own after-examples). voice → v3.3, edit-craft → v1.2 mirror it; generic-baseline marked a retired strawman. (B) Loop 1 (keystone): NEW markos-edits-log.md captures every (system-draft → Markos-final) pair (the highest-signal voice data, previously discarded); provenance field added to both logs. (C) Loop 3: the eval now MUST run — a required ticked precondition of Markos's pre-launch round (advisory verdict), with a trend block (substitution-pass % primary). (D) Substitution test → PRIMARY gate (canonical def in antipatterns → v1.2); blind-lineup demoted to secondary. (E) Scaffolding behind hooks: per-post pillar/mode/story/engagement tags; per-mode voice-stats slots (pending real data); recognition-lineup (≥10 real posts) + style-distance (deferred) documented, NOT built. daily-routine → v1.3, approval-workflow → v1.2. NOT done (refused — the audit's flagged failure mode): style-embedding pipeline, engagement analytics, fabricated per-mode numbers. Launch stays gated."
  - "2.4 (2026-06-08, measurement-spine): Grafted the Spiral-derived measurement spine onto the satellite (QA instruments only — substance stays canonical). NEW chunk voice/voice-stats.md (v1.0): a contrastive voice vector computed from Markos's real verbatim speech + curated written renderings vs a generic-AI baseline (provenance/repro in _research/2026-06-08-voice-stats/). Load-bearing divergences: specificity 2.1×, numerals vs ~0 baseline, em-dashes 25/1k (1.8×), hedges 0.5×, high first-person (the Product-Voice inversion). Reconciled the em-dash contradiction: edit-craft.md → v1.1 and voice.md → v3.2 now defer to a per-voice em-dash TARGET (em-dash is on-voice for Markos), superseding the inherited parent ban. Added a VoM Voice-eval gate (edit-craft.md § Voice-eval gate): blind-lineup (human-ness, reuses the shared /myvault:voice-eval + blind-judge) + a non-blind VoM check (contrarian-opener, on-point, substitution). Wired as a soft gate into daily-routine.md → v1.2 and approval-workflow.md → v1.1 (the Stage-2 pre-launch round); judge→log→ratify flow documented in guide.md. First proof run logged (blend-in 0% on a system-drafted post — instrument discriminates) to _analysis/voice-corrections-log.md. Shared command corpus note refined to prefer verbatim-Markos decoys. NOT done (refused): auto-generated guides, stats overriding pillars/red lines, measuring system-draft logs as baseline. Launch stays gated."
  - "2.3 (2026-06-08, MVM-153): Comment-system reconciliation — integrated Markos's 20-post review (2026-06-04), reversing the v2.1 architecture. comment-craft.md → v3.0 (RESTORES the four kudos-first frameworks + gated credential stories that v2.1 removed; adds lead-with-the-good/engage-the-content opening with the contrarian opener banned as the #1 defect, length up to ~8 sentences on technical posts, story-gating 'at least part of topic' + no-reuse, on-point pre-check, value/ROI-over-privacy topic lens, marketing-tech-AI no-go). Propagated: voice.md → v3.1 (§Comments-are-different rewritten); _retrieval-rules.yaml → v2.3 (stories+identity restored to comment profiles, gated via load_if_relevant); antipatterns.md → v1.1 (The Expertise Platform softened to 'The Ungated Credential'; added The Contrarian Opener + The Off-Point Comment); guardrails.md → v1.1 (Comment No-Go Topics added); daily-routine.md → v1.1 (cap + topic lens); stories.md → v1.1 (scope note updated — gated comment loading, not exclusion). Four decisions held provisional pending Markos's next round (see _analysis/voice-corrections-log.md): version 3.0 not '1.1'; daily cap 7–8 not 15; hashtags in Markos's own hand only; launch still gated (Stage 2)."
  - "2.2 (2026-05-28): Added output_logs section — two running content logs (markos-linkedin-posts-log, markos-linkedin-articles-log) for chronological tracking of every short-form and long-form post under Markos's byline. Full body inline per entry. Not retrieval chunks; checked for past activity only. Wired into voice-of-markos README.md and CLAUDE.md."
  - "2.1 (2026-04-20): Added blog-craft.md (new chunk). Edit-craft gained Pass 0 preservation scan. Opinions and Stories each gained an activation scan at the top. Guardrails Red Zone gained reasoning-category tags and four new rules (vendor-dependency, paraphrased-as-quote, bio claim fact-check, named-vendor-in-failure). Voice gained WHY lines on never-preach, preach phrases, and final test. Derived from 2026-04-20 review-comparison cycle on Markos's enterprise-AI-governance blog."
  - "2.0 (2026-04-16): Consolidated from 19 chunks to 13. Identity, voice, opinions, stories, guardrails each merged into single files. Antipatterns moved from voice/ to craft/. Manifest, retrieval rules, CLAUDE.md, README.md rewritten."
  - "1.2 (2026-04-15): Added edit-craft.md. Added voice-antipatterns-markos.md."
  - "1.0 (2026-04-14): Initial 17 chunks built from Apr 10 voice session."

